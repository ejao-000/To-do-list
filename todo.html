<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Notebook — To-Do</title>

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap"
    rel="stylesheet"
  />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════
       NOTEBOOK WRAPPER
  ══════════════════════════════════════ -->
  <div class="notebook">

    <!-- Spiral binding holes (injected by JS) -->
    <div class="spirals" id="spirals"></div>

    <!-- ── PAGE ── -->
    <div class="page">

      <!-- ── HEADER ── -->
      <div class="header">
        <div class="header-date" id="header-date"></div>
        <h1>My <em>Tasks</em></h1>
        <div class="header-sub">Today's notebook</div>
      </div>

      <!-- ── STATS BAR ── -->
      <div class="stats-bar">
        <div class="stat">
          <span class="stat-num" id="stat-total">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-num" id="stat-done">0</span>
          <span class="stat-label">Done</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-num" id="stat-remaining">0</span>
          <span class="stat-label">Left</span>
        </div>
      </div>

      <!-- ── PROGRESS BAR ── -->
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-label" id="progress-label">No tasks yet</div>
      </div>

      <!-- ── INPUT AREA ── -->
      <div class="input-area">
        <div class="input-row">
          <input
            type="text"
            class="task-input"
            id="task-input"
            placeholder="Write a new task…"
            maxlength="160"
            autocomplete="off"
          />
          <select class="tag-select" id="tag-select">
            <option value="">— tag —</option>
            <option value="work">work</option>
            <option value="personal">personal</option>
            <option value="study">study</option>
            <option value="errand">errand</option>
          </select>
        </div>
        <button class="add-btn" id="add-btn" title="Add task">+</button>
      </div>

      <!-- ── FILTER TABS ── -->
      <div class="filter-area">
        <div class="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="done">Done</button>
        </div>
        <button class="clear-btn" id="clear-btn">Clear completed</button>
      </div>

      <!-- ── TASK LIST ── -->
      <div class="tasks-section">
        <ul id="task-list"></ul>

        <!-- Empty state message -->
        <div class="empty-state" id="empty-state">
          <p>All clear!</p>
          <span>Your page is blank — write something down.</span>
        </div>
      </div>

      <!-- ── FOOTER ── -->
      <div class="page-footer">
        <span class="footer-note">Auto-saved to browser</span>
        <span class="footer-page">pg. 1</span>
      </div>

    </div><!-- end .page -->
  </div><!-- end .notebook -->

  <!-- Toast notification popup -->
  <div class="toast" id="toast"></div>

  <!-- JavaScript -->
  <script src="app.js"></script>

</body>
</html>
